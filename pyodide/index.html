<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7-Card Stud</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v314.0.2/full/pyodide.js"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121416;
      color: #f3f0e8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #121416; }
    button { font: inherit; }
    .app { max-width: 1120px; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 26px; line-height: 1.1; }
    .build { color: #aeb8b3; font-size: 12px; margin-top: 4px; }
    .controls, .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar { margin: 16px 0; min-height: 44px; }
    button {
      border: 1px solid #4f5d56;
      border-radius: 7px;
      color: #f8f5ec;
      background: #26352e;
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
    }
    button.primary { background: #b9412f; border-color: #de705f; }
    button:disabled { opacity: .55; cursor: wait; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; }
    .table {
      min-height: 560px;
      border: 1px solid #3c4a43;
      border-radius: 8px;
      background: radial-gradient(ellipse at center, #1f6a47 0%, #164d37 58%, #123629 100%);
      padding: 18px;
      position: relative;
    }
    .status { display: flex; justify-content: space-between; gap: 12px; color: #e7dcc8; margin-bottom: 14px; }
    .seats { position: relative; min-height: 500px; margin-top: 8px; }
    .table-felt {
      position: absolute;
      inset: 86px 118px 86px;
      border: 1px solid rgba(243,240,232,.22);
      border-radius: 999px;
      background: rgba(3, 17, 12, .28);
      box-shadow: inset 0 0 60px rgba(0,0,0,.22);
      pointer-events: none;
    }
    .seat {
      border: 1px solid rgba(243,240,232,.24);
      border-radius: 8px;
      background: rgba(11, 19, 16, .66);
      padding: 12px;
      min-height: 126px;
      width: clamp(176px, 26%, 230px);
      position: absolute;
      transform: translate(-50%, -50%);
    }
    .seat.hero { border-color: #f2c14e; box-shadow: inset 0 0 0 1px rgba(242,193,78,.3); }
    .seat.starter { outline: 2px solid #5fd0a5; outline-offset: -4px; }
    .seat.turn { box-shadow: 0 0 0 3px rgba(242,193,78,.42), inset 0 0 0 1px rgba(242,193,78,.38); }
    .seat.folded { opacity: .55; }
    .seat.busted { opacity: .45; border-style: dashed; }
    .seat h2 { margin: 0 0 8px; font-size: 15px; font-weight: 700; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; min-height: 22px; margin-bottom: 6px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 999px;
      padding: 0 8px;
      background: #235b48;
      color: #dff8ed;
      font-size: 12px;
      font-weight: 700;
    }
    .cards { display: flex; gap: 6px; flex-wrap: wrap; min-height: 38px; margin: 8px 0; }
    .card {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 46px;
      border-radius: 5px;
      background: #faf8ef;
      color: #191817;
      font-weight: 800;
      font-size: 15px;
      border: 1px solid #d6d0c2;
    }
    .card.back {
      color: transparent;
      background:
        repeating-linear-gradient(45deg, #234f71 0 4px, #193b56 4px 8px);
      border-color: #7ca5c6;
    }
    .card.red { color: #b92225; }
    .downcards {
      border-top: 1px dashed rgba(243,240,232,.35);
      padding-top: 8px;
      margin-top: 8px;
    }
    .meta { margin: 0; color: #d8d0c2; font-size: 13px; line-height: 1.35; }
    aside { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .panel {
      border: 1px solid #333a3d;
      border-radius: 8px;
      background: #1a1d1f;
      padding: 14px;
    }
    .panel-heading { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .panel h2 { margin: 0 0 10px; font-size: 16px; }
    .panel-heading h2 { margin: 0; }
    .mini {
      min-height: 30px;
      padding: 0 9px;
      font-size: 12px;
    }
    .decision { color: #f2c14e; font-weight: 700; }
    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #7be0ad;
      font-weight: 700;
    }
    .thinking::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #7be0ad;
      animation: pulse 900ms ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .35; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    .review { margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a3033; }
    .review strong.right { color: #7be0ad; }
    .review strong.wrong { color: #ff9a88; }
    .prompt {
      width: 100%;
      min-height: 170px;
      margin-top: 10px;
      padding: 10px;
      resize: vertical;
      border-radius: 7px;
      border: 1px solid #4f5d56;
      background: #111416;
      color: #f3f0e8;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .log {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 390px;
      overflow: auto;
      color: #d8d0c2;
      font-size: 13px;
      line-height: 1.45;
    }
    .log li { padding: 7px 0; border-top: 1px solid #2a3033; }
    .error { color: #ff9a88; min-height: 20px; }
    @media (max-width: 840px) {
      .app { padding: 16px; }
      header, main { display: block; }
      .controls { margin-top: 12px; }
      .seats { display: grid; grid-template-columns: 1fr; gap: 12px; min-height: 0; }
      .table-felt { display: none; }
      .seat { position: static; transform: none; width: 100%; }
      aside { margin-top: 16px; }
      .table { min-height: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>7-Card Stud</h1>
        <div class="build">build 396677b</div>
      </div>
      <div class="controls">
        <button class="primary" id="newHand" disabled>Loading Python...</button>
        <button id="resetGame" disabled>Reset Game</button>
      </div>
    </header>
    <main>
      <section class="table" aria-live="polite">
        <div class="status">
          <strong id="street">Loading</strong>
          <span id="pot">Pot $0</span>
        </div>
        <div class="toolbar" id="actions"></div>
        <div class="seats" id="seats"></div>
      </section>
      <aside>
        <section class="panel">
          <h2>Decision</h2>
          <div id="decision">Loading Pyodide and Python game engine.</div>
          <div class="error" id="error"></div>
        </section>
        <section class="panel">
          <div class="panel-heading">
            <h2>Log</h2>
            <button class="mini" id="copyLog">Copy</button>
          </div>
          <ul class="log" id="log"></ul>
        </section>
      </aside>
    </main>
  </div>
  <script>
    let pyodide = null;
    let api = {};
    let currentHandId = null;
    let currentComplete = false;
    const $ = (id) => document.getElementById(id);

    const pythonFiles = [
      "__init__.py",
      "agents.py",
      "browser_api.py",
      "cards.py",
      "evaluator.py",
      "game.py",
      "interactive.py",
    ];

    function setBusy(text) {
      $("actions").textContent = "";
      const waiting = document.createElement("span");
      waiting.className = "thinking";
      waiting.textContent = text;
      $("actions").appendChild(waiting);
    }

    async function initPython() {
      try {
        pyodide = await loadPyodide();
        pyodide.FS.mkdir("/home/pyodide/stud_sim");
        for (const file of pythonFiles) {
          const response = await fetch(`../stud_sim/${file}`);
          if (!response.ok) throw new Error(`Could not load ${file}`);
          pyodide.FS.writeFile(`/home/pyodide/stud_sim/${file}`, await response.text());
        }
        await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, "/home/pyodide")
from stud_sim import browser_api
start_hand = browser_api.start_hand
continue_hand = browser_api.continue_hand
act = browser_api.act
reset_game = browser_api.reset_game
`);
        api.startHand = pyodide.globals.get("start_hand");
        api.continueHand = pyodide.globals.get("continue_hand");
        api.act = pyodide.globals.get("act");
        api.resetGame = pyodide.globals.get("reset_game");
        $("newHand").disabled = false;
        $("resetGame").disabled = false;
        $("newHand").textContent = "Start Hand";
        $("street").textContent = "No hand";
        $("decision").textContent = "Start a hand.";
        $("actions").textContent = "";
      } catch (error) {
        $("street").textContent = "Load failed";
        $("decision").textContent = "Could not load the in-browser Python engine.";
        $("error").textContent = error.message;
      }
    }

    function cardNode(text) {
      const span = document.createElement("span");
      span.className = "card" + (text.includes("♥") || text.includes("♦") ? " red" : "");
      span.textContent = text;
      return span;
    }

    function renderCards(container, text) {
      container.textContent = "";
      const cards = text ? text.split(" ").filter(Boolean) : [];
      if (!cards.length) {
        const p = document.createElement("p");
        p.className = "meta";
        p.textContent = "No cards shown";
        container.appendChild(p);
        return;
      }
      cards.forEach((card) => container.appendChild(cardNode(card)));
    }

    function renderCardBacks(container, count) {
      container.textContent = "";
      if (!count) return;
      for (let index = 0; index < count; index += 1) {
        const span = document.createElement("span");
        span.className = "card back";
        span.textContent = "X";
        container.appendChild(span);
      }
    }

    function render(state) {
      currentHandId = state.hand_id;
      currentComplete = Boolean(state.complete);
      $("street").textContent = `${state.complete ? "Complete" : state.street} · Hand ${state.hand_number || 1}`;
      $("pot").textContent = `Pot $${state.pot}`;
      $("newHand").style.display = state.complete && !state.game_over ? "inline-block" : "none";
      $("newHand").textContent = state.complete ? "Continue" : "Start Hand";
      $("error").textContent = "";

      const pending = state.pending_decision;
      const decision = $("decision");
      decision.textContent = "";
      const current = document.createElement("div");
      current.innerHTML = pending
        ? `<span class="decision">${pending.street}</span><br>${pending.private_cards} / ${pending.exposed_cards}<br>Call $${pending.call_amount}`
        : state.game_over ? `Game over. Winner: ${state.winner || "last player standing"}`
        : state.complete ? `Winner: ${state.winner}` : "Waiting";
      decision.appendChild(current);
      if (state.last_decision_review) {
        const review = state.last_decision_review;
        const block = document.createElement("div");
        block.className = "review";
        const verdict = document.createElement("strong");
        verdict.className = review.correct ? "right" : "wrong";
        verdict.textContent = review.correct
          ? `Good decision: ${review.chosen_action}`
          : `Review: chose ${review.chosen_action}, advisor prefers ${review.recommended_action}`;
        block.appendChild(verdict);
        const detail = document.createElement("p");
        detail.className = "meta";
        detail.textContent = review.explanation;
        block.appendChild(detail);
        if (!review.correct && review.prompt) {
          const copy = document.createElement("button");
          copy.className = "mini";
          copy.textContent = "Copy prompt";
          copy.onclick = () => copyText(review.prompt, copy);
          block.appendChild(copy);
          const prompt = document.createElement("textarea");
          prompt.className = "prompt";
          prompt.readOnly = true;
          prompt.value = review.prompt;
          block.appendChild(prompt);
        }
        decision.appendChild(block);
      }

      const actions = $("actions");
      actions.textContent = "";
      (pending ? pending.legal_actions : []).forEach((action) => {
        const button = document.createElement("button");
        const cost = pending.action_costs ? pending.action_costs[action] : 0;
        button.textContent = cost ? `${action} $${cost}` : action;
        button.onclick = () => doAct(action);
        actions.appendChild(button);
      });

      const seats = $("seats");
      seats.textContent = "";
      const felt = document.createElement("div");
      felt.className = "table-felt";
      seats.appendChild(felt);
      const displaySeats = [...state.seats, ...(state.busted_seats || []).map((seat) => ({...seat, busted: true, folded: true, exposed_cards: "", private_cards: "", in_play: 0}))];
      displaySeats.forEach((seat, index) => {
        const angle = (90 + (index * 360 / Math.max(displaySeats.length, 2))) * Math.PI / 180;
        const left = 50 + Math.cos(angle) * 36;
        const top = 50 + Math.sin(angle) * 39;
        const section = document.createElement("section");
        section.className = "seat" + (seat.name === "Hero" ? " hero" : "") + (pending && pending.seat === seat.name ? " turn" : "") + (seat.started_current_round ? " starter" : "") + (seat.busted ? " busted" : "") + (seat.folded ? " folded" : "");
        section.style.left = `${left}%`;
        section.style.top = `${top}%`;
        const title = document.createElement("h2");
        title.textContent = `${seat.name} · stack $${seat.bankroll}${seat.busted ? " · busted" : seat.folded ? " · folded" : ""}`;
        section.appendChild(title);
        const badges = document.createElement("div");
        badges.className = "badges";
        if (seat.started_current_round) {
          const starter = document.createElement("span");
          starter.className = "badge";
          starter.textContent = "acts first";
          badges.appendChild(starter);
        }
        if (pending && pending.seat === seat.name) {
          const turn = document.createElement("span");
          turn.className = "badge";
          turn.textContent = "your turn";
          badges.appendChild(turn);
        }
        section.appendChild(badges);
        const chips = document.createElement("p");
        chips.className = "meta";
        chips.textContent = `In play: $${seat.in_play || 0}`;
        section.appendChild(chips);
        const exposed = document.createElement("div");
        exposed.className = "cards";
        renderCards(exposed, seat.exposed_cards);
        section.appendChild(exposed);
        const privateCards = document.createElement("div");
        privateCards.className = "cards downcards";
        if (seat.private_cards) {
          renderCards(privateCards, seat.private_cards);
          section.appendChild(privateCards);
        } else if (seat.private_count) {
          renderCardBacks(privateCards, seat.private_count);
          section.appendChild(privateCards);
        }
        seats.appendChild(section);
      });

      const log = $("log");
      log.textContent = "";
      state.log.forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        log.appendChild(li);
      });
      log.scrollTop = log.scrollHeight;
    }

    function parseResult(result) {
      return JSON.parse(String(result));
    }

    async function copyText(text, button) {
      try {
        await navigator.clipboard.writeText(text);
        const original = button.textContent;
        button.textContent = "Copied";
        setTimeout(() => { button.textContent = original; }, 1200);
      } catch (error) {
        $("error").textContent = "Copy failed; select and copy manually.";
      }
    }

    function copyLog() {
      const lines = Array.from($("log").querySelectorAll("li")).map((item) => item.textContent);
      copyText(lines.join("\\n"), $("copyLog"));
    }

    async function newHand() {
      try {
        if (currentHandId && currentComplete) {
          setBusy("Dealing next hand");
          render(parseResult(api.continueHand(currentHandId)));
        } else {
          setBusy("Dealing");
          render(parseResult(api.startHand()));
        }
      } catch (error) {
        $("actions").textContent = "";
        $("error").textContent = error.message;
      }
    }

    async function doAct(action) {
      if (!currentHandId) return;
      try {
        setBusy("Opponents acting");
        await new Promise((resolve) => setTimeout(resolve, 20));
        render(parseResult(api.act(currentHandId, action)));
      } catch (error) {
        $("actions").textContent = "";
        $("error").textContent = error.message;
      }
    }

    function resetGame() {
      if (api.resetGame) api.resetGame();
      currentHandId = null;
      currentComplete = false;
      $("newHand").style.display = "inline-block";
      $("newHand").textContent = "Start Hand";
      $("street").textContent = "No hand";
      $("pot").textContent = "Pot $0";
      $("actions").textContent = "";
      $("seats").textContent = "";
      $("log").textContent = "";
      $("decision").textContent = "Start a hand.";
      $("error").textContent = "";
    }

    $("newHand").onclick = newHand;
    $("resetGame").onclick = resetGame;
    $("copyLog").onclick = copyLog;
    setBusy("Loading Python");
    initPython();
  </script>
</body>
</html>
